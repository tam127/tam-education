<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Tâm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { display: flex; height: 100vh; background: #f4f4f4; }
        .sidebar { width: 250px; background: #2a5a54; color: white; padding: 20px; }
        .sidebar h2 { margin-bottom: 30px; }
        .tab-btn { display: block; width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; cursor: pointer; border-bottom: 1px solid #3e7a73; }
        .tab-btn.active { background: #f1b347; color: #2a5a54; font-weight: bold; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .tab-pane { display: none; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-pane.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; vertical-align: middle; }
        th { background: #f8f8f8; }
        
        .form-control { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .btn-primary { padding: 10px 20px; background: #2a5a54; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-danger { padding: 5px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; }

        /* Giao diện Chat mới */
        .chat-container { display: flex; height: 500px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin-top: 20px; }
        .chat-sidebar { width: 30%; background: #f8f9fa; border-right: 1px solid #ddd; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #ddd; cursor: pointer; transition: background 0.2s; }
        .user-item:hover { background: #e9ecef; }
        .user-item.active { background: #2a5a54; color: white; font-weight: bold; }
        .chat-main { width: 70%; display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 15px; background: #e8f5e9; border-bottom: 1px solid #ddd; font-weight: bold; color: #2a5a54; display: flex; justify-content: space-between;}
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .msg-box { padding: 10px 15px; border-radius: 15px; max-width: 70%; line-height: 1.4; }
        .msg-admin { background: #2a5a54; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-guest { background: #e2e8f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <button class="tab-btn active" onclick="openTab(event, 'chat')">💬 Quản lý Chat</button>
    <button class="tab-btn" onclick="openTab(event, 'inventory')">📦 Kho hàng</button>
</div>

<div class="main-content">
    
    <div id="chat" class="tab-pane active">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Tin nhắn từ khách hàng</h3>
            <button id="toggle-bot-btn" class="btn-danger" style="transition: 0.3s; padding: 8px 15px;">Đang tải trạng thái Bot...</button>
        </div>
        
        <div class="chat-container">
            <div class="chat-sidebar" id="user-list">
                <div style="padding: 15px; color: #666; text-align: center;">Đang tải danh sách...</div>
            </div>
            
            <div class="chat-main">
                <div class="chat-header" id="chat-header-title">Vui lòng chọn một khách hàng bên trái</div>
                <div class="chat-history" id="chat-history">
                    </div>
                <div class="chat-input-area">
                    <input type="text" id="admin-input" class="form-control" placeholder="Nhập tin nhắn..." style="flex: 1;" disabled>
                    <button id="admin-send" class="btn-primary" disabled>Gửi tin</button>
                </div>
            </div>
        </div>
    </div>

    <div id="inventory" class="tab-pane">
        <h3>Quản lý Kho hàng</h3>
        <div style="background: #fff3e0; padding: 20px; border-radius: 8px; margin: 20px 0; border: 1px solid #ffe0b2;">
            <h4 style="margin-bottom: 15px; color: #d35400;">Thêm sản phẩm mới</h4>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <input type="text" id="prod-name" class="form-control" placeholder="Tên sản phẩm..." style="flex: 2; min-width: 200px;">
                <input type="text" id="prod-price" class="form-control" placeholder="Giá (vd: 50.000 VNĐ)" style="flex: 1; min-width: 150px;">
                <input type="file" id="prod-img" class="form-control" accept="image/*" style="flex: 1.5; min-width: 200px; background: white;">
                <button id="add-prod-btn" class="btn-primary" style="background: #d35400;">+ Thêm sản phẩm</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 15%; text-align: center;">Hình ảnh</th>
                    <th style="width: 40%;">Tên sản phẩm</th>
                    <th style="width: 25%;">Giá tiền</th>
                    <th style="width: 20%; text-align: center;">Hành động</th>
                </tr>
            </thead>
            <tbody id="inventory-table-body">
                <tr><td colspan="4" style="text-align: center;">Đang tải dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).style.display = 'block';
        evt.currentTarget.classList.add('active');
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBPyU75RUGU5UbkzecWSOjRWsIZnqqOfnM",
        authDomain: "tameducation-chat.firebaseapp.com",
        projectId: "tameducation-chat",
        storageBucket: "tameducation-chat.firebasestorage.app",
        messagingSenderId: "958617608644",
        appId: "1:958617608644:web:0ba1e87a9c257ef8070491",
        databaseURL: "https://tameducation-chat-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.db = db; window.ref = ref; window.remove = remove; window.onValue = onValue;

    // ==========================================
    // 1. LOGIC QUẢN LÝ CHAT MỚI
    // ==========================================
    let isBotActive = true;
    const botRef = ref(db, 'settings/bot_active');
    const toggleBtn = document.getElementById('toggle-bot-btn');

    onValue(botRef, (snapshot) => {
        isBotActive = snapshot.exists() ? snapshot.val() : true;
        if (isBotActive) {
            toggleBtn.innerHTML = "🔴 Tắt Trả lời tự động (Bot)"; toggleBtn.style.background = "#e74c3c";
        } else {
            toggleBtn.innerHTML = "🟢 Bật Trả lời tự động (Bot)"; toggleBtn.style.background = "#2ecc71";
        }
    });
    toggleBtn.addEventListener('click', () => set(botRef, !isBotActive));

    let currentSelectedChatId = null;
    let activeChatListener = null; // Biến để hủy theo dõi phòng cũ khi chuyển phòng
    const userList = document.getElementById('user-list');
    const chatHistory = document.getElementById('chat-history');
    const adminInput = document.getElementById('admin-input');
    const adminSendBtn = document.getElementById('admin-send');
    const chatHeaderTitle = document.getElementById('chat-header-title');

    // Load danh sách người dùng đã chat
    onValue(ref(db, 'messages/'), (snapshot) => {
        const data = snapshot.val();
        userList.innerHTML = '';
        if (data) {
            Object.keys(data).forEach(chatId => {
                const isActive = chatId === currentSelectedChatId ? 'active' : '';
                userList.innerHTML += `
                    <div class="user-item ${isActive}" onclick="loadChatRoom('${chatId}')">
                        👤 Khách (${chatId.substring(6, 12)})
                    </div>
                `;
            });
        } else {
            userList.innerHTML = '<div style="padding: 15px; color: #666; text-align: center;">Chưa có tin nhắn nào</div>';
        }
    });

    // Hàm chuyển sang phòng chat của người được chọn
    window.loadChatRoom = function(chatId) {
        currentSelectedChatId = chatId;
        chatHeaderTitle.innerHTML = `Đang chat với: Khách (${chatId.substring(6, 12)}) <button onclick="deleteChatRoom('${chatId}')" class="btn-danger" style="font-size: 0.8rem;">Xóa đoạn chat</button>`;
        adminInput.disabled = false;
        adminSendBtn.disabled = false;
        
        // Cập nhật lại UI danh sách người dùng để highlight người được chọn
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // Lấy tin nhắn của người này
        onValue(ref(db, `messages/${chatId}/`), (snapshot) => {
            const msgs = snapshot.val();
            chatHistory.innerHTML = '';
            if (msgs) {
                Object.keys(msgs).forEach(key => {
                    const msg = msgs[key];
                    const isAdmin = msg.sender === "Admin" || msg.sender === "Bot";
                    const boxClass = isAdmin ? 'msg-admin' : 'msg-guest';
                    const senderName = msg.sender === "Bot" ? "🤖 Bot" : (msg.sender === "Admin" ? "👩‍💻 Bạn" : "Khách");
                    
                    chatHistory.innerHTML += `
                        <div class="msg-box ${boxClass}">
                            <div style="font-size: 0.75rem; margin-bottom: 3px; opacity: 0.8;">${senderName}</div>
                            <div>${msg.message}</div>
                        </div>
                    `;
                });
                chatHistory.scrollTop = chatHistory.scrollHeight; // Cuộn xuống cuối
            }
        });
    }

    // Gửi tin nhắn từ Admin
    function sendAdminMessage() {
        if (!currentSelectedChatId) return;
        const text = adminInput.value.trim();
        if(text !== "") {
            push(ref(db, `messages/${currentSelectedChatId}/`), {
                sender: "Admin",
                message: text,
                timestamp: Date.now()
            });
            adminInput.value = '';
        }
    }
    adminSendBtn.addEventListener('click', sendAdminMessage);
    adminInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAdminMessage(); });

    // Hàm Xóa toàn bộ đoạn chat của 1 khách
    window.deleteChatRoom = function(chatId) {
        if(confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử chat với khách hàng này?")) {
            window.remove(window.ref(window.db, `messages/${chatId}`));
            chatHistory.innerHTML = '';
            chatHeaderTitle.innerHTML = 'Đã xóa đoạn chat. Vui lòng chọn khách hàng khác.';
            adminInput.disabled = true;
            adminSendBtn.disabled = true;
            currentSelectedChatId = null;
        }
    }


    // ==========================================
    // 2. CHỨC NĂNG KHO HÀNG (GIỮ NGUYÊN)
    // ==========================================
    const prodNameInput = document.getElementById('prod-name');
    const prodPriceInput = document.getElementById('prod-price');
    const prodImgInput = document.getElementById('prod-img');
    const addProdBtn = document.getElementById('add-prod-btn');
    const inventoryTableBody = document.getElementById('inventory-table-body');

    window.deleteProduct = function(prodKey) {
        if(confirm("Bạn có chắc chắn muốn xóa sản phẩm này khỏi kho hàng?")) {
            window.remove(window.ref(window.db, 'products/' + prodKey));
        }
    };

    addProdBtn.addEventListener('click', () => {
        const name = prodNameInput.value.trim();
        const price = prodPriceInput.value.trim();
        const file = prodImgInput.files[0];

        if(!name || !price || !file) { alert("Vui lòng điền đủ tên, giá và ảnh!"); return; }

        const reader = new FileReader();
        reader.onload = function(e) {
            push(ref(db, 'products/'), {
                name: name, price: price, image: e.target.result, timestamp: Date.now()
            }).then(() => {
                prodNameInput.value = ''; prodPriceInput.value = ''; prodImgInput.value = '';
            });
        };
        reader.readAsDataURL(file);
    });

    onValue(ref(db, 'products/'), (snapshot) => {
        const data = snapshot.val();
        inventoryTableBody.innerHTML = ''; 
        if (data) {
            const products = Object.keys(data).map(key => { return { key: key, ...data[key] }; }).reverse();
            products.forEach(prod => {
                inventoryTableBody.innerHTML += `
                    <tr>
                        <td style="text-align: center;"><img src="${prod.image}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 8px;"></td>
                        <td style="font-weight: bold; color: #2c3e50;">${prod.name}</td>
                        <td style="color: #d35400; font-weight: bold;">${prod.price}</td>
                        <td style="text-align: center;"><button onclick="deleteProduct('${prod.key}')" class="btn-danger">Xóa bỏ</button></td>
                    </tr>
                `;
            });
        } else {
            inventoryTableBody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Kho hàng hiện đang trống.</td></tr>';
        }
    });
</script>

</body>
</html>
