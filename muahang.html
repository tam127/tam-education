<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tâm - Cửa hàng Gây quỹ</title>
    <style>
        /* --- RESET & CƠ BẢN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            overflow-x: hidden; 
            font-family: 'Segoe UI', Tahoma, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f7f9f8; 
            scroll-behavior: smooth;
        }

        /* --- HEADER: HIỆU ỨNG KÍNH MỜ --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px 40px;
            background-color: rgba(42, 90, 84, 0.85); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: all 0.3s ease;
        }

        .brand-name { color: #ffffff; font-weight: 800; font-size: 1.5rem; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .top-btn {
            background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px; border-radius: 30px; font-weight: 600; font-size: 0.95rem; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .top-btn:hover { background-color: #f1b347; border-color: #f1b347; color: #1c453c; transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 15px rgba(241, 179, 71, 0.4); }

        /* --- SECTION: CỬA HÀNG --- */
        .shop-section { padding: 140px 20px 100px; text-align: center; min-height: 85vh; background: linear-gradient(180deg, #f7f9f8 0%, #ffffff 100%); }
        .shop-title { color: #1c453c; font-size: 2.8rem; font-weight: 900; margin-bottom: 15px; letter-spacing: -1px; }
        .shop-subtitle { color: #666; font-size: 1.15rem; margin-bottom: 60px; font-weight: 400; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; max-width: 1100px; margin: 0 auto; }
        
        /* --- THẺ SẢN PHẨM --- */
        .product-card {
            background-color: #fff; padding: 15px 15px 25px 15px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; text-align: center; border: 1px solid #f0f0f0; cursor: pointer;
        }
        .product-card:hover { transform: translateY(-12px) rotate(2deg) scale(1.02); box-shadow: 0 20px 40px rgba(42, 90, 84, 0.15); border-color: rgba(241, 179, 71, 0.5); }
        .product-img { width: 100%; height: 260px; object-fit: cover; border-radius: 4px; margin-bottom: 20px; background-color: #f4f4f4; transition: 0.3s; }
        .product-card:hover .product-img { filter: contrast(1.05) brightness(1.02); }

        .product-info { display: flex; flex-direction: column; flex-grow: 1; align-items: center; }
        .product-name { font-size: 1.3rem; font-weight: 800; color: #222; margin-bottom: 5px; font-family: 'Georgia', serif; }
        .product-color { font-size: 0.95rem; color: #666; margin-bottom: 12px; font-style: italic; flex-grow: 1; }
        .product-price { font-size: 1.2rem; color: #1c453c; font-weight: 700; margin-bottom: 25px; background: rgba(241, 179, 71, 0.2); padding: 5px 15px; border-radius: 20px; }
        
        .btn-buy-now { width: 90%; padding: 14px; background: linear-gradient(135deg, #2a5a54, #1c453c); color: #fff; border: none; border-radius: 25px; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(42, 90, 84, 0.3); }
        .btn-buy-now:hover { background: linear-gradient(135deg, #f1b347, #dca035); color: #1c453c; box-shadow: 0 8px 20px rgba(241, 179, 71, 0.4); }

        /* VÒNG LOAD SẢN PHẨM */
        .loading-wrapper { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(42, 90, 84, 0.2); border-top-color: #f1b347; border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.26, 1.55) infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FOOTER */
        .footer { background-color: #1a1a1a; border-top: 6px solid #f1b347; padding: 60px 10%; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 30px; }
        .footer-logo { width: 130px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        .footer-heading { color: #f1b347; font-size: 1.3rem; margin-bottom: 15px; font-weight: 800; letter-spacing: 1px; }
        .footer p { color: #aaa; font-size: 1rem; line-height: 1.8; }
        .footer-social { color: #aaa; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: inline-block; }
        .footer-social:hover { color: #f1b347; transform: translateY(-5px) scale(1.2); }
        .footer-social svg { width: 45px; height: 45px; }

        @media (max-width: 768px) {
            .header { padding: 15px 20px; } .brand-name { font-size: 1.2rem; }
            .shop-title { font-size: 2.2rem; } .shop-subtitle { font-size: 1rem; margin-bottom: 40px; }
            .footer { flex-direction: column; align-items: center; text-align: center; } .product-grid { gap: 25px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-name">TÂM - SHOP</div>
        <div class="header-actions">
            <a href="index.html" class="top-btn">🏠 Trang Chủ</a>
            <a href="https://www.facebook.com/profile.php?id=61590603537553" target="_blank" rel="noopener noreferrer" class="top-btn">
                Fanpage 
                <svg viewBox="0 0 320 512" width="14" height="14" fill="currentColor">
                    <path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"/>
                </svg>
            </a>
        </div>
    </div>

    <div class="shop-section">
        <h2 class="shop-title">Cửa hàng Gây quỹ</h2>
        <p class="shop-subtitle">Trao đi một món quà, nhận lại ngàn nụ cười.</p>
        
        <div class="product-grid" id="product-grid">
            <div class="loading-wrapper">
                <div class="spinner"></div>
                <div style="color: #666; font-weight: 500;">Đang tải bộ sưu tập...</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-left" style="display: flex; gap: 20px; align-items: center;">
            <img src="logo.png" alt="Logo Tâm" class="footer-logo">
            <div>
                <h3 class="footer-heading">© 2026 TÂM</h3>
                <p>Idea: DNA TEAM<br>Developer: Hai Anh Nguyen</p>
            </div>
        </div>
        <div class="footer-center" style="text-align: center;">
            <h3 class="footer-heading">Kết nối</h3>
            <a href="https://www.facebook.com/profile.php?id=61590603537553" target="_blank" rel="noopener noreferrer" class="footer-social">
                <svg viewBox="0 0 512 512" fill="currentColor"><path d="M504 256C504 119 393 8 256 8S8 119 8 256c0 123.78 90.69 226.38 209.25 245V327.69h-63V256h63v-54.64c0-62.15 37-96.48 93.67-96.48 27.14 0 55.52 4.84 55.52 4.84v61h-31.28c-30.8 0-40.41 19.12-40.41 38.73V256h68.78l-11 71.69h-57.78V501C413.31 482.38 504 379.78 504 256z"/></svg>
            </a>
        </div>
        <div class="footer-right" style="text-align: right;">
            <h3 class="footer-heading">Liên hệ</h3>
            <p>Hotline: 0972554569<br>Zalo: 0972554569<br>Email: haianh12206@gmail.com</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyBPyU75RUGU5UbkzecWSOjRWsIZnqqOfnM",
            authDomain: "tameducation-chat.firebaseapp.com",
            projectId: "tameducation-chat",
            storageBucket: "tameducation-chat.firebasestorage.app",
            messagingSenderId: "958617608644",
            appId: "1:958617608644:web:0ba1e87a9c257ef8070491",
            databaseURL: "https://tameducation-chat-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const productGrid = document.getElementById('product-grid');

        window.buyProduct = function(name, price, img, color) {
            sessionStorage.setItem('checkout_name', name);
            sessionStorage.setItem('checkout_price', price);
            sessionStorage.setItem('checkout_img', img);
            sessionStorage.setItem('checkout_color', color); 
            window.location.href = 'thanhtoan.html';
        };

        setTimeout(() => {
            onValue(ref(db, 'products/'), (snapshot) => {
                const data = snapshot.val();
                productGrid.innerHTML = ''; 
                
                if (data) {
                    const products = Object.keys(data).map(key => ({ key, ...data[key] })).reverse();
                    
                    products.forEach((prod, index) => {
                        const safeName = prod.name.replace(/'/g, "\\'");
                        const rawColor = prod.color ? prod.color : 'Mặc định';
                        const safeColor = rawColor.replace(/'/g, "\\'");
                        
                        const delay = index * 0.1;
                        
                        productGrid.innerHTML += `
                            <div class="product-card" style="animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${delay}s both;">
                                <img src="${prod.image}" alt="${prod.name}" class="product-img">
                                <div class="product-info">
                                    <h3 class="product-name">${prod.name}</h3>
                                    <div class="product-color">Màu: ${rawColor}</div>
                                    <div class="product-price">${prod.price}</div>
                                    <button class="btn-buy-now" onclick="buyProduct('${safeName}', '${prod.price}', '${prod.image}', '${safeColor}')">MUA NGAY</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    productGrid.innerHTML = '<div style="grid-column: 1 / -1; color: #888; font-size: 1.2rem; padding: 50px;">Kho hàng hiện đang trống, bạn hãy quay lại sau nhé!</div>';
                }
            });
        }, 500);

        const style = document.createElement('style');
        style.innerHTML = `@keyframes slideUp { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
