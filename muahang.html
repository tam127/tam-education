<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyBPyU75RUGU5UbkzecWSOjRWsIZnqqOfnM",
            authDomain: "tameducation-chat.firebaseapp.com",
            projectId: "tameducation-chat",
            storageBucket: "tameducation-chat.firebasestorage.app",
            messagingSenderId: "958617608644",
            appId: "1:958617608644:web:0ba1e87a9c257ef8070491",
            databaseURL: "https://tameducation-chat-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.db = db;
        window.update = update;
        
        const productGrid = document.getElementById('product-grid');

        // --- CÁC HÀM XỬ LÝ TRA CỨU ĐƠN & HỦY ĐƠN ---
        window.openLookupModal = function() {
            document.getElementById('lookup-modal').classList.add('active');
        }
        window.closeLookupModal = function() {
            document.getElementById('lookup-modal').classList.remove('active');
            document.getElementById('lookup-results').innerHTML = '';
            document.getElementById('lookup-phone').value = '';
        }

        window.searchOrders = function() {
            const phone = document.getElementById('lookup-phone').value.trim();
            if(!phone) { alert("Vui lòng nhập số điện thoại!"); return; }

            const resultsDiv = document.getElementById('lookup-results');
            resultsDiv.innerHTML = '<div style="text-align:center; color:#aaa; margin-top: 20px;">Đang tìm kiếm dữ liệu...</div>';

            get(ref(db, 'orders/')).then((snapshot) => {
                resultsDiv.innerHTML = '';
                const data = snapshot.val();
                if (data) {
                    const orders = Object.keys(data)
                        .map(key => ({ key, ...data[key] }))
                        .filter(o => o.customerPhone === phone)
                        .reverse();
                    
                    if(orders.length === 0) {
                        resultsDiv.innerHTML = '<div style="text-align:center; color:#e74c3c; margin-top: 20px;">Không tìm thấy đơn hàng nào!</div>';
                        return;
                    }

                    orders.forEach(o => {
                        const date = new Date(o.timestamp).toLocaleString('vi-VN');
                        
                        // Lọc các trạng thái để hiển thị cho Khách hàng
                        const isCancelled = o.status === 'cancelled';
                        const isCompleted = o.status === 'completed';

                        let statusHtml = '';
                        if (isCancelled) {
                            statusHtml = `<span style="color:#e74c3c; font-weight:bold; padding: 2px 8px; background: rgba(231, 76, 60, 0.1); border-radius: 4px;">Đã hủy</span>`;
                        } else if (isCompleted) {
                            statusHtml = `<span style="color:#2ecc71; font-weight:bold; padding: 2px 8px; background: rgba(46, 204, 113, 0.1); border-radius: 4px;">Đã giao thành công</span>`;
                        } else {
                            statusHtml = `<span style="color:#f39c12; font-weight:bold; padding: 2px 8px; background: rgba(243, 156, 18, 0.1); border-radius: 4px;">Đang chờ xử lý</span>`;
                        }

                        let cancelBtn = '';
                        if (isCancelled) {
                            cancelBtn = `<div style="font-size:0.85rem; color:#e74c3c; margin-top:10px; padding: 8px; background: rgba(231,76,60,0.1); border-radius: 6px;">🚫 Lý do hủy: ${o.cancelReason}</div>`;
                        } else if (isCompleted) {
                            cancelBtn = `<div style="font-size:0.85rem; color:#2ecc71; margin-top:10px; padding: 8px; background: rgba(46, 204, 113, 0.1); border-radius: 6px;">🎉 Đơn hàng đã hoàn thành</div>`;
                        } else {
                            cancelBtn = `<button style="margin-top:12px; width: 100%; padding:8px; background:transparent; color:#e74c3c; border:1px solid #e74c3c; border-radius:5px; cursor:pointer; font-weight: bold; transition: 0.2s;" onclick="cancelOrder('${o.key}')" onmouseover="this.style.background='#e74c3c'; this.style.color='white'" onmouseout="this.style.background='transparent'; this.style.color='#e74c3c'">Hủy đơn hàng này</button>`;
                        }

                        resultsDiv.innerHTML += `
                            <div style="background:#222624; border:1px solid #333a37; padding:15px; border-radius:8px; margin-bottom:12px; color:#eaeaea; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                                <div style="font-size:0.85rem; color:#888; margin-bottom:8px; border-bottom: 1px solid #333; padding-bottom: 5px;">📅 ${date}</div>
                                <div style="font-weight:bold; color:#f1b347; margin-bottom:5px; line-height: 1.4;">${o.productName}</div>
                                <div style="margin-bottom:5px; font-size: 0.95rem;">Tổng tiền: <strong style="color: #fff;">${o.totalPrice}</strong></div>
                                <div>Trạng thái: ${statusHtml}</div>
                                ${cancelBtn}
                            </div>
                        `;
                    });
                } else {
                    resultsDiv.innerHTML = '<div style="text-align:center; color:#e74c3c; margin-top: 20px;">Hệ thống chưa có đơn hàng nào!</div>';
                }
            }).catch(error => {
                resultsDiv.innerHTML = '<div style="text-align:center; color:#e74c3c; margin-top: 20px;">Lỗi kết nối máy chủ!</div>';
            });
        }

        window.cancelOrder = function(orderKey) {
            const reason = window.prompt("Vui lòng nhập lý do bạn muốn hủy đơn hàng này (Bắt buộc):");
            if (reason === null) return; 
            if (reason.trim() === "") {
                alert("Bạn phải nhập lý do để hủy đơn!"); return;
            }

            window.update(ref(window.db, 'orders/' + orderKey), {
                status: 'cancelled',
                cancelReason: reason.trim()
            }).then(() => {
                alert("Đã hủy đơn hàng thành công!");
                searchOrders(); 
            }).catch(err => {
                alert("Lỗi khi hủy đơn. Vui lòng thử lại!");
            });
        }

        // --- CÁC HÀM XỬ LÝ KHO HÀNG & GIỎ HÀNG NHƯ CŨ ---
        let cart = JSON.parse(localStorage.getItem('tam_shopping_cart')) || [];
        const cartNoteInput = document.getElementById('cart-note');

        window.toggleCart = function(open) {
            document.getElementById('cart-sidebar').classList.toggle('active', open);
            document.getElementById('cart-overlay').classList.toggle('active', open);
            if(open) renderCartItems();
        }

        window.updatePriceDisplay = function(prodKey) {
            const selectEl = document.getElementById('color-' + prodKey);
            const priceEl = document.getElementById('price-' + prodKey);
            if(selectEl && priceEl) {
                const selectedOpt = selectEl.options[selectEl.selectedIndex];
                priceEl.innerText = selectedOpt.getAttribute('data-price');
            }
        }

        window.addToCart = function(prodKey, name, img) {
            const selectEl = document.getElementById('color-' + prodKey);
            const selectedOpt = selectEl.options[selectEl.selectedIndex];
            const selectedColor = selectedOpt.value;
            const selectedPrice = selectedOpt.getAttribute('data-price');

            const existingItem = cart.find(item => item.name === name && item.color === selectedColor && item.price === selectedPrice);
            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ name, price: selectedPrice, img, color: selectedColor, qty: 1 });
            }
            saveCart(); updateCartBadge(); window.toggleCart(true); 
        }

        window.buyProduct = function(prodKey, name, img) {
            const selectEl = document.getElementById('color-' + prodKey);
            const selectedOpt = selectEl.options[selectEl.selectedIndex];
            const selectedColor = selectedOpt.value;
            const selectedPrice = selectedOpt.getAttribute('data-price');

            sessionStorage.removeItem('checkout_cart'); 
            sessionStorage.setItem('checkout_name', name);
            sessionStorage.setItem('checkout_price', selectedPrice);
            sessionStorage.setItem('checkout_img', img);
            sessionStorage.setItem('checkout_color', selectedColor); 
            window.location.href = 'thanhtoan.html';
        };

        function saveCart() { localStorage.setItem('tam_shopping_cart', JSON.stringify(cart)); }
        function updateCartBadge() { document.getElementById('cart-badge').innerText = cart.reduce((total, item) => total + item.qty, 0); }
        function extractNumber(priceStr) { return parseInt(priceStr.replace(/[^0-9]/g, '')) || 0; }

        function renderCartItems() {
            const body = document.getElementById('cart-body-items');
            body.innerHTML = '';
            if(cart.length === 0) {
                body.innerHTML = '<div style="text-align:center; padding:50px 0; color:#666;">Giỏ hàng của bạn đang trống!</div>';
                document.getElementById('cart-total-price').innerText = '0 VNĐ';
                return;
            }

            let grandTotal = 0;
            cart.forEach((item, index) => {
                const itemTotal = extractNumber(item.price) * item.qty;
                grandTotal += itemTotal;

                body.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-item-img">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-color">Phân loại: ${item.color}</div>
                            <div class="cart-item-price">${item.price}</div>
                            <div class="cart-item-qty-wrapper">
                                <button class="cart-qty-btn" onclick="updateQty(${index}, -1)">-</button>
                                <input type="number" class="cart-qty-input" value="${item.qty}" readonly>
                                <button class="cart-qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            </div>
                        </div>
                        <button class="remove-item-btn" onclick="removeCartItem(${index})">&times;</button>
                    </div>
                `;
            });
            document.getElementById('cart-total-price').innerText = grandTotal.toLocaleString('vi-VN') + " VNĐ";
        }

        window.updateQty = function(index, change) {
            cart[index].qty += change;
            if(cart[index].qty < 1) cart[index].qty = 1;
            saveCart(); updateCartBadge(); renderCartItems();
        }

        window.removeCartItem = function(index) {
            cart.splice(index, 1);
            saveCart(); updateCartBadge(); renderCartItems();
        }

        window.proceedToCheckout = function() {
            if(cart.length === 0) { alert("Vui lòng thêm sản phẩm vào giỏ hàng!"); return; }
            sessionStorage.setItem('checkout_cart', JSON.stringify(cart));
            sessionStorage.setItem('checkout_note', cartNoteInput ? cartNoteInput.value.trim() : ""); 
            window.location.href = 'thanhtoan.html';
        }

        onValue(ref(db, 'products/'), (snapshot) => {
            const data = snapshot.val();
            productGrid.innerHTML = ''; 
            if (data) {
                const products = Object.keys(data).map(key => ({ key, ...data[key] })).reverse();
                products.forEach(prod => {
                    const safeName = prod.name.replace(/'/g, "\\'");
                    
                    const rawColor = prod.color ? prod.color : 'Mặc định';
                    const colorArray = rawColor.split(/[,;\-]/).map(c => c.trim()).filter(c => c !== "");
                    
                    let colorOptionsHtml = '';
                    let defaultPriceToDisplay = prod.price;

                    colorArray.forEach((c, idx) => {
                        let optName = c;
                        let optPrice = prod.price; 
                        
                        if (c.includes('=') || c.includes(':')) {
                            let parts = c.split(/[=:]/);
                            optName = parts[0].trim();
                            optPrice = parts[1].trim();
                            if (!optPrice.toLowerCase().includes('vnđ')) optPrice += ' VNĐ';
                        }

                        if (idx === 0) defaultPriceToDisplay = optPrice;
                        colorOptionsHtml += `<option value="${optName}" data-price="${optPrice}">${optName}</option>`;
                    });

                    productGrid.innerHTML += `
                        <div class="product-card" style="animation: slideUp 0.4s ease-out both;">
                            <img src="${prod.image}" alt="${prod.name}" class="product-img">
                            <div class="product-info">
                                <h3 class="product-name">${prod.name}</h3>
                                <div class="color-select-wrapper">
                                    <select id="color-${prod.key}" class="color-select" onchange="updatePriceDisplay('${prod.key}')">
                                        ${colorOptionsHtml}
                                    </select>
                                </div>
                                <div class="product-price" id="price-${prod.key}">${defaultPriceToDisplay}</div>
                                <div class="btn-container">
                                    <button class="btn-add-cart" onclick="addToCart('${prod.key}', '${safeName}', '${prod.image}')">🛒</button>
                                    <button class="btn-buy-now" onclick="buyProduct('${prod.key}', '${safeName}', '${prod.image}')">MUA NGAY</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                productGrid.innerHTML = '<div style="grid-column: 1 / -1; color: #888; padding: 50px;">Kho hàng trống.</div>';
            }
            updateCartBadge();
        });

        const style = document.createElement('style');
        style.innerHTML = `@keyframes slideUp { 0% { opacity:0; transform:translateY(30px); } 100% { opacity:1; transform:translateY(0); } }`;
        document.head.appendChild(style);
    </script>
