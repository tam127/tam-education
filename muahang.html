<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tâm - Cửa hàng Gây quỹ</title>
    <style>
        /* --- RESET & CƠ BẢN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            overflow-x: hidden; 
            font-family: 'Segoe UI', Tahoma, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #1a201e; /* Màu nền tối theo ảnh */
            color: #eaeaea;
            scroll-behavior: smooth;
        }

        /* --- HEADER KÍNH MỜ (TỐI) --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px 40px;
            background-color: rgba(26, 43, 38, 0.9); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: all 0.3s ease;
            border-bottom: 1px solid #2a3b36;
        }

        .brand-name { color: #ffffff; font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .top-btn {
            background-color: rgba(255, 255, 255, 0.05); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px; border-radius: 30px; font-weight: 600; font-size: 0.95rem; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.3s; 
        }
        .top-btn:hover { background-color: #2a5a54; border-color: #2a5a54; transform: translateY(-3px); }

        .cart-icon-wrapper { position: relative; font-size: 1.5rem; cursor: pointer; color: white; margin-left: 10px; transition: 0.2s; display: flex; align-items: center; }
        .cart-icon-wrapper:hover { transform: scale(1.1); color: #f1b347; }
        #cart-badge { position: absolute; top: -6px; right: -10px; background: #e74c3c; color: white; font-size: 0.7rem; font-weight: bold; border-radius: 50%; padding: 2px 5px; min-width: 18px; text-align: center; border: 2px solid #1a201e; }

        /* --- SECTION: CỬA HÀNG --- */
        .shop-section { padding: 120px 20px 100px; text-align: center; min-height: 85vh; }
        .shop-title { color: #f1b347; font-size: 2.8rem; font-weight: 900; margin-bottom: 10px; }
        .shop-subtitle { color: #aaa; font-size: 1.15rem; margin-bottom: 50px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; }
        
        /* --- THẺ SẢN PHẨM (DARK MODE) --- */
        .product-card {
            background-color: #222624; padding: 15px 15px 25px 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.3s; display: flex; flex-direction: column; text-align: center; border: 1px solid #333a37;
        }
        .product-card:hover { transform: translateY(-8px); border-color: #f1b347; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .product-img { width: 100%; height: 260px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; background-color: #1a1f1d; }

        .product-info { display: flex; flex-direction: column; flex-grow: 1; align-items: center; }
        .product-name { font-size: 1.25rem; font-weight: 800; color: #fff; margin-bottom: 15px; }
        
        /* DROPDOWN CHỌN MÀU */
        .color-select-wrapper { width: 100%; margin-bottom: 15px; }
        .color-select { 
            width: 100%; padding: 10px 12px; border: 1px solid #444; border-radius: 8px; 
            font-size: 0.95rem; color: #ddd; outline: none; background: #1a201e; cursor: pointer; transition: 0.2s; 
        }
        .color-select:focus { border-color: #f1b347; }
        
        .product-price { font-size: 1.25rem; color: #f1b347; font-weight: 700; margin-bottom: 20px; background: rgba(241, 179, 71, 0.1); padding: 6px 20px; border-radius: 20px; border: 1px solid rgba(241, 179, 71, 0.2); }
        
        .btn-container { display: flex; width: 100%; gap: 10px; }
        .btn-add-cart { flex: 1; padding: 12px 0; background: transparent; color: #aaa; border: 1px solid #555; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .btn-add-cart:hover { background: #333; color: #fff; border-color: #fff; }
        .btn-buy-now { flex: 2.5; padding: 12px 0; background: #2a5a54; color: #fff; border: none; border-radius: 25px; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: 0.3s; }
        .btn-buy-now:hover { background: #1c453c; transform: scale(1.02); }

        /* --- SIDEBAR GIỎ HÀNG (DARK MODE) --- */
        .cart-sidebar { position: fixed; top: 0; right: -420px; width: 420px; height: 100vh; background: #1a201e; box-shadow: -5px 0 35px rgba(0,0,0,0.5); z-index: 9999; transition: 0.3s; display: flex; flex-direction: column; color: #fff; border-left: 1px solid #2a3b36; }
        .cart-sidebar.active { right: 0; }
        .cart-header { padding: 25px 20px; border-bottom: 1px solid #2a3b36; display: flex; justify-content: space-between; align-items: center; background: #141917; }
        .cart-title { font-weight: bold; font-size: 1.3rem; color: #f1b347; }
        .close-cart-btn { background: none; border: none; color: #aaa; font-size: 2rem; cursor: pointer; line-height: 1; transition: 0.2s; }
        .close-cart-btn:hover { color: #fff; transform: scale(1.1); }
        
        .cart-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .cart-item { display: flex; gap: 15px; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #2a3b36; }
        .cart-item-img { width: 65px; height: 65px; object-fit: cover; border-radius: 8px; border: 1px solid #444; }
        .cart-item-info { flex: 1; text-align: left; }
        .cart-item-name { font-weight: bold; font-size: 1rem; color: #fff; margin-bottom: 2px; }
        .cart-item-color { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        .cart-item-price { color: #f1b347; font-weight: bold; font-size: 0.95rem; }
        
        .cart-item-qty-wrapper { display: flex; align-items: center; border: 1px solid #444; border-radius: 5px; margin-top: 6px; width: fit-content; background: #222; }
        .cart-qty-btn { width: 28px; height: 26px; background: #333; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .cart-qty-btn:hover { background: #555; }
        .cart-qty-input { width: 35px; text-align: center; border: none; background: transparent; color: #fff; font-size: 0.9rem; font-weight: bold; outline: none; pointer-events: none;}
        
        .remove-item-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1.5rem; padding: 5px; transition: 0.2s; }
        .remove-item-btn:hover { transform: scale(1.2); }

        .cart-footer { padding: 20px; border-top: 1px solid #2a3b36; background: #141917; }
        .cart-note-input { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; font-size: 0.95rem; margin-bottom: 15px; resize: none; outline: none; font-family: inherit; background: #1a201e; color: #fff; }
        .cart-note-input:focus { border-color: #2a5a54; }
        
        .cart-total-box { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; color: #fff; border-bottom: 1px dashed #444; padding-bottom: 15px; }
        #cart-total-price { color: #f1b347; font-size: 1.4rem; }
        
        .btn-checkout { width: 100%; padding: 16px; background: #f1b347; color: #1c453c; border: none; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-checkout:hover { background: #dca035; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(241,179,71,0.2); }
        
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 9998; display: none; backdrop-filter: blur(3px); }
        .cart-overlay.active { display: block; }

        .loading-wrapper { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(42, 90, 84, 0.2); border-top-color: #f1b347; border-radius: 50%; animation: spin 1s infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FOOTER */
        .footer { background-color: #121514; border-top: 4px solid #2a5a54; padding: 60px 10%; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 30px; }
        .footer-logo { width: 130px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .footer-heading { color: #f1b347; font-size: 1.3rem; margin-bottom: 15px; font-weight: 800; }
        .footer p { color: #888; font-size: 1rem; line-height: 1.8; }
        .footer-social { color: #888; transition: 0.3s; display: inline-block; }
        .footer-social:hover { color: #f1b347; transform: scale(1.1); }
        .footer-social svg { width: 45px; height: 45px; }

        @media (max-width: 768px) {
            .header { padding: 15px 20px; } .brand-name { font-size: 1.2rem; }
            .shop-title { font-size: 2.2rem; } .cart-sidebar { width: 100%; right: -100%; }
            .footer { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-name">TÂM - SHOP</div>
        <div class="header-actions">
            <a href="index.html" class="top-btn">🏠 Trang Chủ</a>
            <a href="https://www.facebook.com/profile.php?id=61590603537553" target="_blank" rel="noopener noreferrer" class="top-btn">Fanpage</a>
            <div class="cart-icon-wrapper" onclick="toggleCart(true)">
                🛒<span id="cart-badge">0</span>
            </div>
        </div>
    </div>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart(false)"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <div class="cart-title">🛍️ Giỏ hàng của bạn</div>
            <button class="close-cart-btn" onclick="toggleCart(false)">&times;</button>
        </div>
        <div class="cart-body" id="cart-body-items"></div>
        <div class="cart-footer">
            <textarea id="cart-note" class="cart-note-input" rows="2" placeholder="Ghi chú đơn hàng (Ví dụ: Giao giờ hành chính)..."></textarea>
            <div class="cart-total-box">
                <div>TỔNG TIỀN:</div>
                <div id="cart-total-price">0 VNĐ</div>
            </div>
            <button class="btn-checkout" onclick="proceedToCheckout()">Tiến hành thanh toán</button>
        </div>
    </div>

    <div class="shop-section">
        <h2 class="shop-title">Cửa hàng Gây quỹ</h2>
        <p class="shop-subtitle">Trao đi một món quà, nhận lại ngàn nụ cười.</p>
        <div class="product-grid" id="product-grid">
            <div class="loading-wrapper"><div class="spinner"></div><div style="color: #888;">Đang tải bộ sưu tập...</div></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-left" style="display: flex; gap: 20px; align-items: center;">
            <img src="logo.png" alt="Logo Tâm" class="footer-logo">
            <div><h3 class="footer-heading">© 2026 TÂM</h3><p>Idea: DNA TEAM<br>Developer: Hai Anh Nguyen</p></div>
        </div>
        <div class="footer-center" style="text-align: center;">
            <h3 class="footer-heading">Kết nối</h3>
            <a href="https://www.facebook.com/profile.php?id=61590603537553" target="_blank" rel="noopener noreferrer" class="footer-social">
                <svg viewBox="0 0 512 512" fill="currentColor"><path d="M504 256C504 119 393 8 256 8S8 119 8 256c0 123.78 90.69 226.38 209.25 245V327.69h-63V256h63v-54.64c0-62.15 37-96.48 93.67-96.48 27.14 0 55.52 4.84 55.52 4.84v61h-31.28c-30.8 0-40.41 19.12-40.41 38.73V256h68.78l-11 71.69h-57.78V501C413.31 482.38 504 379.78 504 256z"/></svg>
            </a>
        </div>
        <div class="footer-right" style="text-align: right;">
            <h3 class="footer-heading">Liên hệ</h3>
            <p>Hotline: 0972554569<br>Zalo: 0972554569<br>Email: haianh12206@gmail.com</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyBPyU75RUGU5UbkzecWSOjRWsIZnqqOfnM",
            authDomain: "tameducation-chat.firebaseapp.com",
            projectId: "tameducation-chat",
            storageBucket: "tameducation-chat.firebasestorage.app",
            messagingSenderId: "958617608644",
            appId: "1:958617608644:web:0ba1e87a9c257ef8070491",
            databaseURL: "https://tameducation-chat-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const productGrid = document.getElementById('product-grid');

        let cart = JSON.parse(localStorage.getItem('tam_shopping_cart')) || [];
        const cartNoteInput = document.getElementById('cart-note');

        window.toggleCart = function(open) {
            document.getElementById('cart-sidebar').classList.toggle('active', open);
            document.getElementById('cart-overlay').classList.toggle('active', open);
            if(open) renderCartItems();
        }

        // TỰ ĐỘNG ĐỔI GIÁ TIỀN TRÊN MÀN HÌNH KHI ĐỔI PHÂN LOẠI
        window.updatePriceDisplay = function(prodKey) {
            const selectEl = document.getElementById('color-' + prodKey);
            const priceEl = document.getElementById('price-' + prodKey);
            if(selectEl && priceEl) {
                const selectedOpt = selectEl.options[selectEl.selectedIndex];
                priceEl.innerText = selectedOpt.getAttribute('data-price');
            }
        }

        // THÊM VÀO GIỎ
        window.addToCart = function(prodKey, name, img) {
            const selectEl = document.getElementById('color-' + prodKey);
            const selectedOpt = selectEl.options[selectEl.selectedIndex];
            const selectedColor = selectedOpt.value;
            const selectedPrice = selectedOpt.getAttribute('data-price');

            const existingItem = cart.find(item => item.name === name && item.color === selectedColor && item.price === selectedPrice);
            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ name, price: selectedPrice, img, color: selectedColor, qty: 1 });
            }
            saveCart();
            updateCartBadge();
            window.toggleCart(true); 
        }

        // MUA NGAY 1 SẢN PHẨM NHANH
        window.buyProduct = function(prodKey, name, img) {
            const selectEl = document.getElementById('color-' + prodKey);
            const selectedOpt = selectEl.options[selectEl.selectedIndex];
            const selectedColor = selectedOpt.value;
            const selectedPrice = selectedOpt.getAttribute('data-price');

            sessionStorage.removeItem('checkout_cart'); 
            sessionStorage.setItem('checkout_name', name);
            sessionStorage.setItem('checkout_price', selectedPrice);
            sessionStorage.setItem('checkout_img', img);
            sessionStorage.setItem('checkout_color', selectedColor); 
            window.location.href = 'thanhtoan.html';
        };

        function saveCart() { localStorage.setItem('tam_shopping_cart', JSON.stringify(cart)); }
        function updateCartBadge() { document.getElementById('cart-badge').innerText = cart.reduce((total, item) => total + item.qty, 0); }
        function extractNumber(priceStr) { return parseInt(priceStr.replace(/[^0-9]/g, '')) || 0; }

        function renderCartItems() {
            const body = document.getElementById('cart-body-items');
            body.innerHTML = '';
            if(cart.length === 0) {
                body.innerHTML = '<div style="text-align:center; padding:50px 0; color:#666;">Giỏ hàng của bạn đang trống!</div>';
                document.getElementById('cart-total-price').innerText = '0 VNĐ';
                return;
            }

            let grandTotal = 0;
            cart.forEach((item, index) => {
                const itemTotal = extractNumber(item.price) * item.qty;
                grandTotal += itemTotal;

                body.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-item-img">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-color">Phân loại: ${item.color}</div>
                            <div class="cart-item-price">${item.price}</div>
                            <div class="cart-item-qty-wrapper">
                                <button class="cart-qty-btn" onclick="updateQty(${index}, -1)">-</button>
                                <input type="number" class="cart-qty-input" value="${item.qty}" readonly>
                                <button class="cart-qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            </div>
                        </div>
                        <button class="remove-item-btn" onclick="removeCartItem(${index})">&times;</button>
                    </div>
                `;
            });
            document.getElementById('cart-total-price').innerText = grandTotal.toLocaleString('vi-VN') + " VNĐ";
        }

        window.updateQty = function(index, change) {
            cart[index].qty += change;
            if(cart[index].qty < 1) cart[index].qty = 1;
            saveCart(); updateCartBadge(); renderCartItems();
        }

        window.removeCartItem = function(index) {
            cart.splice(index, 1);
            saveCart(); updateCartBadge(); renderCartItems();
        }

        window.proceedToCheckout = function() {
            if(cart.length === 0) { alert("Vui lòng thêm sản phẩm vào giỏ hàng!"); return; }
            sessionStorage.setItem('checkout_cart', JSON.stringify(cart));
            sessionStorage.setItem('checkout_note', cartNoteInput ? cartNoteInput.value.trim() : ""); 
            window.location.href = 'thanhtoan.html';
        }

        onValue(ref(db, 'products/'), (snapshot) => {
            const data = snapshot.val();
            productGrid.innerHTML = ''; 
            if (data) {
                const products = Object.keys(data).map(key => ({ key, ...data[key] })).reverse();
                products.forEach(prod => {
                    const safeName = prod.name.replace(/'/g, "\\'");
                    
                    // XỬ LÝ TÁCH OPTION KỂ CẢ KHI DÙNG DẤU GẠCH NGANG (-)
                    const rawColor = prod.color ? prod.color : 'Mặc định';
                    const colorArray = rawColor.split(/[,;\-]/).map(c => c.trim()).filter(c => c !== "");
                    
                    let colorOptionsHtml = '';
                    let defaultPriceToDisplay = prod.price;

                    colorArray.forEach((c, idx) => {
                        let optName = c;
                        let optPrice = prod.price; 
                        
                        if (c.includes('=') || c.includes(':')) {
                            let parts = c.split(/[=:]/);
                            optName = parts[0].trim();
                            optPrice = parts[1].trim();
                            if (!optPrice.toLowerCase().includes('vnđ')) optPrice += ' VNĐ';
                        }

                        if (idx === 0) defaultPriceToDisplay = optPrice;
                        colorOptionsHtml += `<option value="${optName}" data-price="${optPrice}">${optName}</option>`;
                    });

                    productGrid.innerHTML += `
                        <div class="product-card" style="animation: slideUp 0.4s ease-out both;">
                            <img src="${prod.image}" alt="${prod.name}" class="product-img">
                            <div class="product-info">
                                <h3 class="product-name">${prod.name}</h3>
                                <div class="color-select-wrapper">
                                    <select id="color-${prod.key}" class="color-select" onchange="updatePriceDisplay('${prod.key}')">
                                        ${colorOptionsHtml}
                                    </select>
                                </div>
                                <div class="product-price" id="price-${prod.key}">${defaultPriceToDisplay}</div>
                                <div class="btn-container">
                                    <button class="btn-add-cart" onclick="addToCart('${prod.key}', '${safeName}', '${prod.image}')">🛒</button>
                                    <button class="btn-buy-now" onclick="buyProduct('${prod.key}', '${safeName}', '${prod.image}')">MUA NGAY</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                productGrid.innerHTML = '<div style="grid-column: 1 / -1; color: #888; padding: 50px;">Kho hàng trống.</div>';
            }
            updateCartBadge();
        });

        const style = document.createElement('style');
        style.innerHTML = `@keyframes slideUp { 0% { opacity:0; transform:translateY(30px); } 100% { opacity:1; transform:translateY(0); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
